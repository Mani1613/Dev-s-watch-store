{% extends 'store/base.html' %}

{% block content %}

<h2 class="page-title">Our Collection</h2>

<section class="products">

    {% for product in products %}
    <div class="product-card">
        <img src="{{ product.image.url }}">
        <h3>{{ product.name }}</h3>
        <p class="price">₹{{ product.price }}</p>
    </div>
    {% endfor %}

</section>

{% endblock %}
